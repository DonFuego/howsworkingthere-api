version: "3.9"

services:
  api:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: hows-working-there-api
      HTTP_PORT: 8080
      DB_HOST: db
      DB_PORT: 5432
      DB_DIALECT: postgres
      DB_USER: hwt
      DB_PASSWORD: hwt_secret
      DB_NAME: howsworkingthere
      DB_SSL_MODE: disable
      # Copy these from configs/.env for local dev:
      AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: hwt
      POSTGRES_PASSWORD: hwt_secret
      POSTGRES_DB: howsworkingthere
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docs/check-in-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./docs/enable-pgvector.sql:/docker-entrypoint-initdb.d/02-pgvector.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hwt -d howsworkingthere"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
