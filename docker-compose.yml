version: "3.9"

services:
  api:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - configs/.env
    environment:
      # Override for local dev if using a local Postgres instead of Supabase
      # DB_HOST: db
      # DB_PORT: 5432
      # DB_DIALECT: postgres
      # DB_SSL_MODE: disable
      APP_NAME: hows-working-there-api
      HTTP_PORT: 8080
